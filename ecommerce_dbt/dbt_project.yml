name: 'ecommerce_dbt'

config-version: 2
version: '0.1'

profile: 'ecommerce_dbt'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analysis"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
    - "target"
    - "dbt_modules"
    - "logs"

require-dbt-version: [">=1.0.0", "<2.0.0"]

seeds:
  ecommerce_dbt:
    +tags: ["daily"]


models:
  ecommerce_dbt:
      materialized: table
      staging:
        +materialized: view
        +docs:
          node_color: 'silver'
      mart:
        +materialized: table
        +docs:
          node_color: 'gold'